name: Publish Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "*/6 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      has_public_changes: ${{ steps.detect_changes.outputs.has_public_changes }}
      has_state_changes: ${{ steps.detect_changes.outputs.has_state_changes }}
      refreshed_windows: ${{ steps.build_dashboard.outputs.refreshed_windows }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build dashboard
        id: build_dashboard
        env:
          PAGES_TZ: "UTC"
          REQUEST_TIMEOUT: "90"
          REQUEST_RETRIES: "6"
        run: |
          python generate_pages.py | tee build.log
          REFRESHED="$(python - <<'PY'
          import re
          from pathlib import Path
          log = Path("build.log").read_text(encoding="utf-8", errors="ignore")
          m = re.search(r"refreshed=\[([^\]]*)\]", log)
          print(m.group(1).replace(" ", "") if m else "")
          PY
          )"
          echo "refreshed_windows=$REFRESHED" >> "$GITHUB_OUTPUT"

      - name: Detect changed outputs
        id: detect_changes
        run: |
          git add .pages_data public
          if git diff --cached --quiet -- .pages_data; then
            echo "has_state_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_state_changes=true" >> "$GITHUB_OUTPUT"
          fi
          if git diff --cached --quiet -- public; then
            echo "has_public_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_public_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit data/state for next runs
        if: steps.detect_changes.outputs.has_state_changes == 'true' && steps.build_dashboard.outputs.refreshed_windows != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(data): update pages state [skip ci]" -- .pages_data
          git push origin HEAD:${{ github.ref_name }}

      - name: Skip state commit on empty update
        if: steps.detect_changes.outputs.has_state_changes != 'true' || steps.build_dashboard.outputs.refreshed_windows == ''
        run: echo "No meaningful window refresh detected; skipping state commit."

      - name: Upload Pages artifact
        if: steps.detect_changes.outputs.has_public_changes == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Build summary
        run: |
          {
            echo "## Dashboard build summary"
            echo "- refreshed_windows: `${{ steps.build_dashboard.outputs.refreshed_windows || 'none' }}`"
            echo "- state_changed: `${{ steps.detect_changes.outputs.has_state_changes }}`"
            echo "- public_changed: `${{ steps.detect_changes.outputs.has_public_changes }}`"
            echo ""
            echo "### Build log tail"
            echo '```'
            tail -n 30 build.log || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    needs: build
    if: needs.build.outputs.has_public_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify_failure:
    needs: [build, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Create failure alert issue
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `🚨 Publish Dashboard failed (${new Date().toISOString()})`;
            const body = [
              "Workflow `Publish Dashboard` завершился с ошибкой.",
              "",
              `- run_id: ${context.runId}`,
              `- branch: ${context.ref}`,
              `- actor: ${context.actor}`,
              `- logs: ${runUrl}`
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["ci", "bug"]
            });
